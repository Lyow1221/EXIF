<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="EXIF Տվյալներ" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta
      property="og:description"
      content="Տեղեկություններ EXIF ֆայլերի մասին, ինչպես ստուգել, փոփոխել և ավելացնել նոր տվյալներ ձեր նկարների համար"
    />
    <meta
      property="og:url"
      content="https://rainbow-youtiao-8f6d98.netlify.app/"
    />
    <meta property="og:image" content="The Open Graph protocol/file.png" />
    <title>EXIF Data</title>
    <link rel="icon" href="Logo/exif.png" type="image/x-icon" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <div class="block">
        <select id="selectLang">
          <option data-lang="hy" value="index_hy.html">ARM</option>
          <option data-lang="en" value="index_en.html" selected>EN</option>
          <option data-lang="ru" value="index_ru.html">RU</option>
        </select>
        <h1>EXIF Data</h1>
        <h2>Upload Image</h2>

        <label class="buttonInput" for="fileInput" id="fileInputLabel"
          >Choose Image</label
        >
        <input type="file" id="fileInput" accept="image/jpeg" />

        <img src="" id="imagePreview" />

        <div id="exifData">EXIF data will appear here...</div>
      </div>

      <div class="block block_second">
        <h2>Add data</h2>
        <input
          type="text"
          class="inputText"
          id="authorInput"
          placeholder="Author (Latin script)"
        />
        <input
          type="text"
          class="inputText"
          id="descriptionInput"
          placeholder="Description (Latin script)"
        />
        <input
          type="text"
          class="inputText"
          id="commentInput"
          placeholder="Comment (Latin script)"
        />
        <input
          type="button"
          class="buttonInput"
          id="addExifBtn"
          value="Add EXIF"
        />

        <input
          type="text"
          class="inputText"
          id="nameFile"
          placeholder="Image Name"
        />
        <a id="downloadLink">Download Modified Image</a>
      </div>
    </div>

    <script src="piexif.js"></script>
    <script src="script.js"></script>
  </body>
</html>
